appId: com.uzakmasaustu.app
productName: Uzak Masaüstü Bağlantısı
copyright: Copyright © 2026

directories:
  output: release

files:
  - dist/**/*
  - electron/**/*
  - node_modules/**/*
  - package.json

win:
  target:
    - target: nsis
      arch: [x64]
  icon: electron/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: electron/icon.ico
  uninstallerIcon: electron/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Uzak Masaüstü

extraResources:
  - from: dist
    to: dist

publish: null
